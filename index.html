<!DOCTYPE html>

<html>
    <head>
        <!-- <meta http-equiv="Content-Security-Policy" content="default-src 'self' unsafe-inline"> -->

        <link rel="stylesheet" href="./ui/main.css">
        <script src="./ui/js/camera-source.js"></script>
    </head>
    <body>

        <div id="initial">
            <div class="center-container">
                <div class="center-contents">
                    <img src="./ui/img/logo-white.png" id="main-logo">
                    <div id="camera-instructions" class="ui-text instructions">
                        Select a Camera Source
                    </div>
                    <div id="camera-sources">
                        <button class="ui-text btn camera-source-btn">Source 1</button>
                        <button class="ui-text btn camera-source-btn">Source 2</button>
                        <button class="ui-text btn camera-source-btn">Source 3</button>
                    </div>
                </div>
            </div>
            <div id="build-tag">
                v0.1.0 (012721)
            </div>
        </div>

        <div id="header" class="hide">
            <img src="./ui/img/logo-white.png" id="header-logo">
        </div>

        <div id="select-scoreboard" class="hide">

            <p class="ui-text instructions">Select the Scoreboard's Corners</p>

            <div class="center overlay-container">
                <video id="raw-source"></video>
                <canvas class="overlay" id="corner-canvas"></canvas>
            </div>

            
            <div id='corners-container'>
                <div id="next-corner">
                    <span>Click the</span>
                    <span id="next-corner-id">Top Left</span>
                    <span>Corner</span>
                </div>
                <div class="hide" id="new-scoreboard-btn">
                    <button class="ui-text btn">
                        Add New Scoreboard
                    </button>
                </div>
                <div>
                    <button class="ui-text btn red" onclick="ResetCorners()">
                        Reset
                    </button>
                </div>
                <div>
                    <button class="ui-text btn green" disabled id="corners-continue-btn">
                        Continue
                    </button>
                </div>
            </div>

        </div>

        <script src="./ui/js/corner-selection.js"></script>
    </body>
</html>
